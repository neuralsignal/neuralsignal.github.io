---
layout: default
---

<div class="blog-page">
  <h2 class="section-title">{{ page.title }}</h2>

  <div class="index-list">
    {%- for post in page.posts %}
    <a class="index-item" href="{{ post.url | relative_url }}">
      <span class="index-meta">{{ post.date | date: "%b %Y" }}</span>
      <span class="index-text">
        <span class="index-title">{{ post.title }}</span>
      </span>
    </a>
    {%- endfor %}
  </div>
</div>
